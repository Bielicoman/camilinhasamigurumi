<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Camilinhas Amigurumi</title>
    
    <link rel="icon" type="image/webp" href="assets/img/brand/logo-camilinhas-circle.webp">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/main.css?v=1.6">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        body {
            background-color: #f7f3ee;
            color: #2d2a26;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .error-container {
            text-align: center;
            z-index: 10;
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .error-badge {
            display: inline-block;
            padding: 8px 16px;
            background: #fff8f0;
            color: #f59e0b;
            border-radius: 100px;
            font-weight: 900;
            font-size: 12px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 24px;
            border: 1px solid rgba(245, 158, 11, 0.1);
        }

        .h-serif {
            font-family: 'Playfair Display', serif;
        }

        .btn-home {
            display: inline-block;
            margin-top: 48px;
            padding: 20px 48px;
            background: #f59e0b;
            color: white;
            border-radius: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            font-size: 13px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.2);
        }

        .btn-home:hover {
            transform: translateY(-5px);
            background: #d97706;
            box-shadow: 0 20px 40px rgba(245, 158, 11, 0.3);
        }

        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }

        .decor {
            position: absolute;
            font-size: 100px;
            opacity: 0.05;
            color: #f59e0b;
            z-index: 0;
            pointer-events: none;
        }

        .bg-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 35vw;
            font-weight: 900;
            color: #2d2a26;
            opacity: 0.03;
            z-index: 1;
            pointer-events: none;
            user-select: none;
            line-height: 1;
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>
    <div class="bg-text">404</div>
    
    <!-- Custom Cursor -->
    <div id="custom-cursor"
        class="fixed w-4 h-4 bg-[#facc15] rounded-full pointer-events-none z-[9999] hidden md:block">
    </div>
    <div class="decor" style="top: 10%; left: 10%; transform: rotate(-15deg);"><i class="fas fa-heart"></i></div>
    <div class="decor" style="bottom: 15%; right: 10%; transform: rotate(20deg);"><i class="fas fa-star"></i></div>

    <div class="error-container px-8">
        <div class="error-badge">Página não encontrada</div>
        
        <h1 class="h-serif italic text-5xl md:text-7xl text-[#2d2a26] mb-8 leading-tight">Um ponto <br>escapou da agulha.</h1>
        <p class="text-[#2d2a26]/50 text-sm md:text-base font-medium max-w-sm mx-auto leading-relaxed">
            Parece que o amigurumi que você procura se perdeu no novelo. Não se preocupe, vamos te guiar de volta!
        </p>

        <a href="index.html" class="btn-home">
            Voltar para o Início
        </a>
    </div>
    <script>
        // Cursor Logic
        const cursor = document.getElementById('custom-cursor');
        const interactives = document.querySelectorAll('a, button');

        window.addEventListener('mousemove', (e) => {
            if (cursor) {
                gsap.to(cursor, {
                    x: e.clientX,
                    y: e.clientY,
                    duration: 0.1,
                    ease: "power2.out"
                });
            }
        });

        interactives.forEach(el => {
            el.addEventListener('mouseenter', () => {
                if (cursor) gsap.to(cursor, { scale: 4, backgroundColor: 'rgba(250, 204, 21, 0.3)', duration: 0.3 });
            });
            el.addEventListener('mouseleave', () => {
                if (cursor) gsap.to(cursor, { scale: 1, backgroundColor: '#facc15', duration: 0.3 });
            });
        });
    </script>
</body>

</html>
