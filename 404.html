<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Camilinhas Amigurumi</title>
    
    <link rel="icon" type="image/webp" href="assets/img/brand/logo-camilinhas-circle.webp">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/main.css?v=1.6">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background-color: #0a0a0a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .error-container {
            text-align: center;
            z-index: 10;
        }

        .error-code {
            font-size: clamp(6rem, 15vw, 12rem);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(to bottom, #f59e0b, #d97706);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.2;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            user-select: none;
        }

        .btn-back {
            display: inline-block;
            margin-top: 40px;
            padding: 18px 40px;
            background: #f59e0b;
            color: white;
            border-radius: 50px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 11px;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            text-decoration: none;
            box-shadow: 0 20px 40px rgba(245, 158, 11, 0.2);
        }

        .btn-back:hover {
            transform: translateY(-5px);
            background: #d97706;
            box-shadow: 0 30px 60px rgba(245, 158, 11, 0.4);
        }

        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Light Mode */
        html.light body {
            background-color: #f2ede4;
        }
        html.light .h-serif { color: #1a1816; }
        html.light .text-white\/60 { color: #5c554a; }
    </style>
</head>

<body>
    <div class="bg-glow"></div>
    <div class="error-code">404</div>

    <div class="error-container px-6">
        <div class="mb-8">
            <img src="assets/img/brand/logo-camilinhas-circle.webp" alt="Logo" class="h-24 mx-auto mb-12 opacity-50 grayscale hover:grayscale-0 transition-all duration-700">
        </div>
        
        <h1 class="h-serif italic text-4xl md:text-6xl text-white mb-6">Ops! Este amigurumi se perdeu.</h1>
        <p class="text-white/60 text-sm md:text-base uppercase tracking-[0.2em] max-w-md mx-auto leading-relaxed">
            A página que você está procurando não foi encontrada ou foi movida para outro cantinho.
        </p>

        <a href="index.html" class="btn-back">
            Voltar para o Início
        </a>
    </div>

    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.add('light');
        }
    </script>
</body>

</html>
