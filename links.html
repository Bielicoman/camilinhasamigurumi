<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camilinhas Amigurumi | Links</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/webp" href="assets/img/brand/logo-camilinhas-circle.webp">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/main.css?v=1.6">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:ital,wght@0,900;1,900&display=swap');

        body {
            background-color: #f7f3ee;
            color: #2d2a26;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: 'Inter', sans-serif;
        }

        .links-container {
            width: 100%;
            max-width: 420px;
            text-align: center;
            animation: softFadeIn 1s ease-out;
        }

        @keyframes softFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .h-serif {
            font-family: 'Playfair Display', serif;
        }

        .profile-section {
            margin-bottom: 40px;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid white;
            padding: 0;
            margin: 0 auto 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            background: white;
        }

        .link-card {
            background: white;
            border: 1px solid rgba(0, 0, 0, 0.04);
            padding: 16px 24px;
            border-radius: 24px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #2d2a26;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-size: 12px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        }

        .link-card:hover {
            transform: scale(1.02);
            background: #ffffff;
            box-shadow: 0 20px 40px rgba(245, 158, 11, 0.15);
            border-color: #f59e0b;
        }

        .link-card .icon-wrapper {
            width: 32px;
            height: 32px;
            background: #fff8f0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f59e0b;
            transition: all 0.3s;
        }

        .link-card:hover .icon-wrapper {
            background: #f59e0b;
            color: white;
        }

        .social-links {
            margin-top: 48px;
            display: flex;
            justify-content: center;
            gap: 24px;
        }

        .social-icon {
            width: 44px;
            height: 44px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2d2a26;
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.3s;
        }

        .social-icon:hover {
            background: #f59e0b;
            color: white;
            transform: translateY(-3px);
        }

        .bg-blobs {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            background: #f59e0b;
            filter: blur(80px);
            opacity: 0.08;
            border-radius: 50%;
        }
    </style>
</head>

<body>
    <div class="bg-blobs">
        <div class="blob w-64 h-64 -top-20 -left-20"></div>
        <div class="blob w-96 h-96 -bottom-32 -right-32" style="background: #eab308;"></div>
    </div>

    <div class="links-container">
        <!-- Profile -->
        <div class="profile-section">
            <div class="profile-img">
                <img src="assets/img/brand/logo-camilinhas-circle.webp" alt="Camilinhas Amigurumi" class="w-full h-full object-cover">
            </div>
            <h1 class="h-serif italic text-4xl text-[#2d2a26] mb-1">Camilinhas</h1>
            <p class="text-[#2d2a26]/40 uppercase tracking-[0.3em] text-[10px] font-black">Arte que toca o coração</p>
        </div>

        <!-- Links -->
        <div class="space-y-4">
            <a href="index.html" class="link-card">
                <span>Loja Online</span>
                <div class="icon-wrapper">
                    <i class="fas fa-shopping-bag"></i>
                </div>
            </a>
            
            <a href="https://instagram.com/camilinhasamigurumi" target="_blank" class="link-card">
                <span>Instagram</span>
                <div class="icon-wrapper">
                    <i class="fab fa-instagram"></i>
                </div>
            </a>

            <a href="https://wa.me/556792804803" target="_blank" class="link-card">
                <span>WhatsApp</span>
                <div class="icon-wrapper">
                    <i class="fab fa-whatsapp"></i>
                </div>
            </a>

            <a href="index.html#products" class="link-card">
                <span>Ver Catálogo</span>
                <div class="icon-wrapper">
                    <i class="fas fa-book-open"></i>
                </div>
            </a>

            <a href="index.html#custom" class="link-card">
                <span>Encomendas</span>
                <div class="icon-wrapper">
                    <i class="fas fa-magic"></i>
                </div>
            </a>
        </div>

        <!-- Social Icons -->
        <div class="social-links">
            <a href="https://instagram.com/camilinhasamigurumi" class="social-icon"><i class="fab fa-instagram"></i></a>
            <a href="https://wa.me/556792804803" class="social-icon"><i class="fab fa-whatsapp"></i></a>
            <a href="mailto:contato@camilinhas.com.br" class="social-icon"><i class="far fa-envelope"></i></a>
        </div>
        
        <p class="mt-12 text-[10px] uppercase tracking-[0.4em] text-[#2d2a26]/20 font-bold">
            © 2024 Camilinhas Amigurumi
        </p>
    </div>
</body>

</html>
