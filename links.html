<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camilinhas Amigurumi | Links</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass-container {
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .link-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .link-card:hover {
            background: rgba(245, 158, 11, 0.2);
            border-color: rgba(245, 158, 11, 0.6);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 40px -10px rgba(245, 158, 11, 0.4);
        }
        .logo-light {
            /* No filter to keep original yellow color as requested */
            filter: drop-shadow(0 0 10px rgba(245, 158, 11, 0.3));
        }
        .bg-banner {
            background-image: url('assets/img/brand/camila-banner.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        html.light body {
            background-color: #fafaf9;
            color: #1c1c1c;
        }
        html.light .glass-container {
            background: rgba(250, 250, 249, 0.9);
            border-color: rgba(0, 0, 0, 0.1);
        }
        html.light .link-card {
            background: rgba(0, 0, 0, 0.03);
            border-color: rgba(0, 0, 0, 0.08);
        }
        html.light .logo-light {
            filter: none;
        }
        html.light .link-item span {
            color: #1c1c1c !important;
        }
        html.light .link-item .text-white\/50 {
            color: rgba(0, 0, 0, 0.5) !important;
        }

        /* Infantil Elements */
        .amigurumi-bubble {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), rgba(251, 191, 36, 0.05));
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>

<body class="bg-[#121212] text-white min-h-screen relative overflow-x-hidden transition-colors duration-500 bg-banner">
    
    <!-- Background Overlay -->
    <div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-0"></div>

    <!-- Magical Particles -->
    <div class="fixed inset-0 pointer-events-none z-1" id="particles-container"></div>

    <!-- Theme Toggle -->
    <button onclick="toggleTheme()" class="fixed top-6 right-6 w-12 h-12 bg-white/10 backdrop-blur-md rounded-full flex items-center justify-center z-50 hover:bg-amber-500 hover:text-white transition-colors border border-white/10">
        <i class="fas fa-moon" id="theme-icon"></i>
    </button>

    <!-- Custom Cursor -->
    <div id="custom-cursor" class="fixed w-4 h-4 bg-amber-500 rounded-full pointer-events-none z-[9999] mix-blend-difference transform -translate-x-1/2 -translate-y-1/2 hidden md:block transition-transform duration-100 ease-out"></div>

    <div class="relative z-10 w-full min-h-screen flex flex-col items-center justify-center p-6 py-16">
        
        <div class="glass-container w-full max-w-md rounded-[3rem] p-8 md:p-12 shadow-2xl relative overflow-hidden border border-white/10">
            <!-- Decorative circle -->
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-amber-500/10 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-amber-500/5 rounded-full blur-3xl"></div>

            <!-- Profile -->
            <div class="profile-anim mb-10 text-center relative z-10">
                <div class="w-32 h-32 rounded-full overflow-hidden border-4 border-amber-500/30 mx-auto mb-6 shadow-2xl shadow-amber-500/30 relative group">
                    <img src="assets/img/brand/logo-camilinhas.webp" alt="Camilinhas Amigurumi" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                </div>
                <img src="assets/img/brand/logo-text.webp" alt="Camilinhas Amigurumi" class="h-12 mx-auto mb-4 drop-shadow-lg logo-light">
                <p class="text-white/80 dark-text-light text-sm max-w-xs mx-auto leading-relaxed font-light italic">
                    Arte que toca o coração. <br>
                    <span class="text-amber-500 font-bold uppercase text-[9px] tracking-[0.3em]">Artesanato Premium para Pequenos e Grandes</span>
                </p>
            </div>

            <!-- Links -->
            <div class="w-full flex flex-col gap-4 relative z-10" id="links-container">
                <a href="index.html" class="link-item link-card rounded-3xl p-5 flex items-center justify-between group">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center text-amber-500 group-hover:bg-amber-500 group-hover:text-white transition-all duration-500 group-hover:rotate-12">
                            <i class="fas fa-globe text-lg"></i>
                        </div>
                        <div class="flex flex-col">
                            <span class="font-bold text-[15px] tracking-tight text-white">Site Oficial</span>
                            <span class="text-[10px] text-white/50 uppercase tracking-widest">Nossa vitrine completa</span>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-white/20 group-hover:text-amber-500 transition-colors transform group-hover:translate-x-1"></i>
                </a>
                
                <a href="index.html#vitrine" class="link-item link-card rounded-3xl p-5 flex items-center justify-between group">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center text-amber-500 group-hover:bg-amber-500 group-hover:text-white transition-all duration-500 group-hover:rotate-12">
                            <i class="fas fa-shopping-bag text-lg"></i>
                        </div>
                        <div class="flex flex-col">
                            <span class="font-bold text-[15px] tracking-tight text-white">Catálogo de Produtos</span>
                            <span class="text-[10px] text-white/50 uppercase tracking-widest">Explore nossas coleções</span>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-white/20 group-hover:text-amber-500 transition-colors transform group-hover:translate-x-1"></i>
                </a>

                <a href="https://wa.me/556792804803?text=Olá,%20gostaria%20de%20solicitar%20um%20orçamento%20personalizado!" target="_blank" class="link-item link-card rounded-3xl p-5 flex items-center justify-between group">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center text-green-500 group-hover:bg-green-500 group-hover:text-white transition-all duration-500 group-hover:rotate-12">
                            <i class="fab fa-whatsapp text-xl"></i>
                        </div>
                        <div class="flex flex-col">
                            <span class="font-bold text-[15px] tracking-tight text-white">Encomenda Especial</span>
                            <span class="text-[10px] text-white/50 uppercase tracking-widest">Fale com a Adriana</span>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-white/20 group-hover:text-green-500 transition-colors transform group-hover:translate-x-1"></i>
                </a>

                <a href="https://instagram.com/camilinhas_amigurumi" target="_blank" class="link-item link-card rounded-3xl p-5 flex items-center justify-between group">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center text-pink-500 group-hover:bg-gradient-to-tr group-hover:from-yellow-400 group-hover:via-pink-500 group-hover:to-purple-500 group-hover:text-white transition-all duration-500 group-hover:rotate-12">
                            <i class="fab fa-instagram text-xl"></i>
                        </div>
                        <div class="flex flex-col">
                            <span class="font-bold text-[15px] tracking-tight text-white">Siga no Instagram</span>
                            <span class="text-[10px] text-white/50 uppercase tracking-widest">Bastidores e novidades</span>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-white/20 group-hover:text-pink-500 transition-colors transform group-hover:translate-x-1"></i>
                </a>
            </div>

            <!-- Footer -->
            <div class="mt-12 text-center profile-anim w-full relative z-10">
                <div class="h-[1px] w-full bg-gradient-to-r from-transparent via-white/10 to-transparent mb-8"></div>
                <img src="assets/img/brand/logo-text.webp" alt="Camilinhas" class="h-6 opacity-30 mx-auto mb-4 hover:opacity-100 transition-opacity logo-light">
                <p class="text-[8px] font-black text-white/20 uppercase tracking-[0.4em] italic">Handmade with love in MS</p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        // Custom Cursor
        const cursor = document.getElementById('custom-cursor');
        cursor.style.opacity = "0"; // Start hidden

        window.addEventListener('mousemove', (e) => {
            cursor.style.opacity = "1";
            gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.1, ease: "power2.out" });
        });

        const interactives = document.querySelectorAll('a, button');
        interactives.forEach(el => {
            el.addEventListener('mouseenter', () => { gsap.to(cursor, { scale: 3, backgroundColor: 'rgba(245, 158, 11, 0.3)', duration: 0.3 }); });
            el.addEventListener('mouseleave', () => { gsap.to(cursor, { scale: 1, backgroundColor: '#f59e0b', duration: 0.3 }); });
        });

        // Animations
        gsap.from(".profile-anim", {
            y: 40,
            opacity: 0,
            duration: 1.2,
            stagger: 0.2,
            ease: "power4.out"
        });

        gsap.from(".link-item", {
            y: 30,
            opacity: 0,
            duration: 1,
            stagger: 0.15,
            ease: "back.out(1.5)",
            delay: 0.4
        });

        // Magical Particles + Amigurumi Bubbles
        const particlesContainer = document.getElementById('particles-container');
        
        // Add some "infantil" bubbles
        for (let i = 0; i < 8; i++) {
            const bubble = document.createElement('div');
            bubble.className = 'amigurumi-bubble';
            const size = Math.random() * 100 + 50;
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;
            bubble.style.left = `${Math.random() * 100}%`;
            bubble.style.top = `${Math.random() * 100}%`;
            particlesContainer.appendChild(bubble);

            gsap.to(bubble, {
                y: `+=${Math.random() * 100 - 50}`,
                x: `+=${Math.random() * 100 - 50}`,
                duration: 5 + Math.random() * 5,
                repeat: -1,
                yoyo: true,
                ease: "sine.inOut"
            });
        }

        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'absolute bg-amber-500/20 rounded-full blur-[1px]';
            const size = Math.random() * 6 + 2;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}%`;
            particle.style.top = `${Math.random() * 100}%`;
            particlesContainer.appendChild(particle);

            gsap.to(particle, {
                y: "-=100",
                x: `+=${Math.random() * 40 - 20}`,
                opacity: 0,
                duration: 4 + Math.random() * 4,
                repeat: -1,
                ease: "none",
                delay: Math.random() * 5
            });
        }

        // Parallax Effect
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX - window.innerWidth / 2) / 50;
            const y = (e.clientY - window.innerHeight / 2) / 50;
            gsap.to(".bg-banner", {
                backgroundPosition: `calc(50% + ${x}px) calc(50% + ${y}px)`,
                duration: 1,
                ease: "power2.out"
            });
        });

        // Theme Toggle
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            html.classList.toggle('light');
            const isLight = html.classList.contains('light');
            icon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('camilinhas-theme', isLight ? 'light' : 'dark');
            
            // Adjust specific texts
            document.querySelectorAll('.dark-text-light').forEach(el => {
                if (isLight) {
                    el.classList.remove('text-white/60');
                    el.classList.add('text-black/60');
                } else {
                    el.classList.add('text-white/60');
                    el.classList.remove('text-black/60');
                }
            });
        }

        // Restore saved theme
        (function() {
            const saved = localStorage.getItem('camilinhas-theme');
            if (saved === 'light') {
                document.documentElement.classList.add('light');
                const icon = document.getElementById('theme-icon');
                if (icon) icon.className = 'fas fa-sun';
                
                document.querySelectorAll('.dark-text-light').forEach(el => {
                    el.classList.remove('text-white/60');
                    el.classList.add('text-black/60');
                });
            }
        })();
    </script>
</body>
</html>
